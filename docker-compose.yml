# Task M5: compose file that starts Python (FastAPI), Go (Gin), and Rust (Axum) services.

version: "3.9"

services:
  go_service:
    build: ./go_service
    ports:
      - "8082:8082"
    restart: unless-stopped
    # go_service runs on a scratch image (no shell/wget inside),
    # so in-container healthchecks are not possible.

  python_service:
    build: ./python_service
    ports:
      - "8090:8090"
    environment:
      GO_SERVICE_URL: http://go_service:8082
    depends_on:
      - go_service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  rust_service:
    build: ./rust_service
    ports:
      - "8091:8091"
    restart: unless-stopped
    # rust_service runs on a scratch image (no shell/wget inside),
    # so in-container healthchecks are not possible.
